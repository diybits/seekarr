services:
  seekarr:
    image: ghcr.io/diybits/seekarr:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seekarr
    ports:
      - "9705:9705"
    volumes:
      - seekarr-config:/config
    environment:
      - TZ=America/New_York
      # Set TRUST_PROXY=1 when running behind a reverse proxy (Nginx, Traefik, Caddy, etc.)
      # This enables ProxyFix so real client IPs are forwarded correctly and the session
      # cookie gets the Secure flag. Do NOT set this for direct/public-facing deployments.
      # - TRUST_PROXY=1
    restart: unless-stopped

volumes:
  seekarr-config:
    name: seekarr-config