services:
  seekarr:
    image: ghcr.io/diybits/seekarr:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seekarr
    ports:
      - "9705:9705"
    volumes:
      - seekarr-config:/config
    environment:
      - TZ=America/New_York
      # Set TRUSTED_PROXIES when running behind a reverse proxy (Nginx, Traefik, Caddy, etc.)
      # Value: "*" to trust any upstream, or a comma-separated list of proxy IPs/CIDRs.
      # This rewrites REMOTE_ADDR from X-Forwarded-For and sets the Secure cookie flag.
      # Do NOT set this for direct/public-facing deployments — it would allow IP spoofing.
      # - TRUSTED_PROXIES=*
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9705/ping')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  seekarr-config:
    name: seekarr-config