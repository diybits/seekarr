name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check [existing issues](https://github.com/diybits/seekarr/issues) first — someone may have already requested this.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the limitation or gap you're hitting.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: app
    attributes:
      label: Related app (if applicable)
      multiple: true
      options:
        - Sonarr
        - Radarr
        - Lidarr
        - Readarr
        - Whisparr v2
        - Whisparr v3 (Eros)
        - Swaparr
        - Not app-specific

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you thought of.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help — screenshots, links, etc.
