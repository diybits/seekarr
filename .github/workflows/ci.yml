name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint (errors and undefined names only)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # ── Stage 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --tb=short \
              --cov=src/primary \
              --cov-report=term-missing \
              --cov-report=json:coverage.json
          else
            echo "No tests/ directory found — skipping (add tests to enable this gate)"
          fi

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.json ]; then
            python3 -c "
import json, sys
data = json.load(open('coverage.json'))
total = data['totals']['percent_covered']
covered = data['totals']['covered_lines']
missing = data['totals']['missing_lines']
print(f'Coverage: {total:.1f}%  ({covered} covered, {missing} missing)')
sys.exit(0 if total >= 50 else 1)
"
          fi

